<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana & Shady's Engagement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #C5D1D8;
            font-family: 'Cormorant Garamond', serif;
            padding: 40px 20px;
        }

        .invitation-container {
            position: relative;
            display: flex;
            gap: 0;
        }

        /* Main Invitation Card */
        .invitation-card {
            width: 380px;
            background: #FFFEF9;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15);
            position: relative;
            z-index: 2;
        }

        /* Floral Wreath */
        .floral-wreath {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .wreath-svg {
            width: 100%;
            height: 100%;
        }

        /* Using CSS to create floral elements */
        .wreath-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .flower {
            position: absolute;
            border-radius: 50%;
        }

        /* Pink flowers */
        .flower.pink { background: radial-gradient(circle, #F5D0D0 30%, #E8B4B8 70%); }
        .flower.rose { background: radial-gradient(circle, #E8C0C8 30%, #D4A0A8 70%); }
        .flower.white { background: radial-gradient(circle, #FFF 30%, #F5E8E0 70%); }
        .flower.yellow { background: radial-gradient(circle, #F8E8A0 30%, #E8D080 70%); }
        .flower.blue { background: radial-gradient(circle, #A8C8E0 30%, #88B0D0 70%); }
        .flower.purple { background: radial-gradient(circle, #D8C0E0 30%, #C0A0D0 70%); }

        /* Leaves */
        .leaf {
            position: absolute;
            background: linear-gradient(45deg, #90A878 0%, #B8C8A0 100%);
            border-radius: 0 70% 0 70%;
        }

        /* Position flowers around wreath */
        .f1 { width: 25px; height: 25px; top: 5px; left: 85px; }
        .f2 { width: 20px; height: 20px; top: 15px; left: 55px; }
        .f3 { width: 18px; height: 18px; top: 20px; left: 125px; }
        .f4 { width: 22px; height: 22px; top: 35px; left: 30px; }
        .f5 { width: 28px; height: 28px; top: 30px; left: 145px; }
        .f6 { width: 15px; height: 15px; top: 55px; left: 15px; }
        .f7 { width: 20px; height: 20px; top: 50px; left: 165px; }
        .f8 { width: 18px; height: 18px; top: 80px; left: 5px; }
        .f9 { width: 22px; height: 22px; top: 75px; left: 175px; }
        .f10 { width: 16px; height: 16px; top: 110px; left: 0px; }
        .f11 { width: 20px; height: 20px; top: 105px; left: 180px; }
        .f12 { width: 18px; height: 18px; top: 140px; left: 10px; }
        .f13 { width: 24px; height: 24px; top: 135px; left: 168px; }
        .f14 { width: 20px; height: 20px; top: 165px; left: 30px; }
        .f15 { width: 22px; height: 22px; top: 160px; left: 150px; }
        .f16 { width: 18px; height: 18px; top: 180px; left: 60px; }
        .f17 { width: 20px; height: 20px; top: 178px; left: 125px; }
        .f18 { width: 15px; height: 15px; top: 188px; left: 95px; }

        /* Leaves positioning */
        .l1 { width: 20px; height: 8px; top: 25px; left: 70px; transform: rotate(-30deg); }
        .l2 { width: 25px; height: 10px; top: 40px; left: 155px; transform: rotate(40deg); }
        .l3 { width: 18px; height: 7px; top: 65px; left: 20px; transform: rotate(-50deg); }
        .l4 { width: 22px; height: 9px; top: 90px; left: 170px; transform: rotate(60deg); }
        .l5 { width: 20px; height: 8px; top: 120px; left: 5px; transform: rotate(-70deg); }
        .l6 { width: 18px; height: 7px; top: 150px; left: 175px; transform: rotate(50deg); }
        .l7 { width: 22px; height: 9px; top: 170px; left: 40px; transform: rotate(-20deg); }
        .l8 { width: 20px; height: 8px; top: 175px; left: 140px; transform: rotate(25deg); }

        /* Small accent flowers */
        .accent {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .accent.a1 { background: #E0D0A0; top: 10px; left: 110px; }
        .accent.a2 { background: #A0C0D0; top: 45px; left: 10px; }
        .accent.a3 { background: #D0A0C0; top: 60px; left: 175px; }
        .accent.a4 { background: #C0D0A0; top: 95px; left: 185px; }
        .accent.a5 { background: #D0C0A0; top: 130px; left: -5px; }
        .accent.a6 { background: #A0D0C0; top: 185px; left: 80px; }

        /* Monogram in center */
        .monogram {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Pinyon Script', cursive;
            font-size: 52px;
            color: #444;
            letter-spacing: -5px;
            z-index: 10;
        }

        .monogram span {
            display: inline-block;
        }

        .monogram .h { transform: translateX(5px); }
        .monogram .s { transform: translateX(-5px) translateY(5px); }

        /* Typography */
        .together-text {
            font-size: 14px;
            font-style: italic;
            color: #666;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .names {
            font-size: 22px;
            font-weight: 400;
            color: #333;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .invite-text {
            font-size: 14px;
            font-style: italic;
            color: #666;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .date-main {
            font-size: 18px;
            font-weight: 500;
            color: #333;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .date-details {
            font-size: 14px;
            font-style: italic;
            color: #555;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .venue-name {
            font-size: 13px;
            color: #555;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .reception-text {
            font-size: 13px;
            font-style: italic;
            color: #888;
        }

        /* Envelope behind */
        .envelope {
            position: relative;
            width: 300px;
            margin-left: -80px;
            z-index: 1;
        }

        .envelope-flap {
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, #F5E8E0 0%, #FDF5F0 100%);
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            position: relative;
            overflow: hidden;
        }

        /* Floral pattern on envelope */
        .envelope-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FCEEE8;
        }

        .envelope-pattern::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 15% 20%, #E8B8B8 4px, transparent 4px),
                radial-gradient(circle at 30% 15%, #B8D0B8 3px, transparent 3px),
                radial-gradient(circle at 45% 25%, #D8B8D8 4px, transparent 4px),
                radial-gradient(circle at 60% 10%, #E8D8B8 3px, transparent 3px),
                radial-gradient(circle at 75% 20%, #B8C8E0 4px, transparent 4px),
                radial-gradient(circle at 85% 15%, #E0B8C0 3px, transparent 3px),
                radial-gradient(circle at 20% 40%, #C8E0C8 4px, transparent 4px),
                radial-gradient(circle at 40% 35%, #E8C0C0 3px, transparent 3px),
                radial-gradient(circle at 55% 45%, #C0C8E0 4px, transparent 4px),
                radial-gradient(circle at 70% 40%, #D8D0B8 3px, transparent 3px),
                radial-gradient(circle at 25% 60%, #E0C8D8 4px, transparent 4px),
                radial-gradient(circle at 50% 55%, #C8D8C0 3px, transparent 3px),
                radial-gradient(circle at 75% 60%, #E8C8B8 4px, transparent 4px),
                radial-gradient(circle at 35% 75%, #B8D8D8 3px, transparent 3px),
                radial-gradient(circle at 65% 70%, #D8B8E0 4px, transparent 4px),
                radial-gradient(circle at 50% 85%, #E0D8C0 3px, transparent 3px),
                radial-gradient(circle at 20% 85%, #C0E0D0 4px, transparent 4px),
                radial-gradient(circle at 80% 80%, #E8C0D0 3px, transparent 3px);
        }

        .envelope-body {
            width: 100%;
            height: 180px;
            background: linear-gradient(180deg, #FCEEE8 0%, #F8E8E0 50%, #E8D8D0 100%);
            margin-top: -1px;
        }

        /* Map link button */
        .map-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #555;
            text-decoration: none;
            border: 1px solid #ccc;
            transition: all 0.3s ease;
        }

        .map-link:hover {
            background: #333;
            color: #fff;
            border-color: #333;
        }

        /* Mobile */
        @media (max-width: 700px) {
            .invitation-container {
                flex-direction: column;
                align-items: center;
            }
            .envelope {
                display: none;
            }
            .invitation-card {
                width: 100%;
                max-width: 360px;
                padding: 40px 30px;
            }
            .wreath-container {
                width: 160px;
                height: 160px;
            }
            .names { font-size: 18px; letter-spacing: 2px; }
            .date-main { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="invitation-container">
        <!-- Main Card -->
        <div class="invitation-card">
            <!-- Floral Wreath with Monogram -->
            <div class="wreath-container">
                <!-- Flowers -->
                <div class="flower pink f1"></div>
                <div class="flower white f2"></div>
                <div class="flower rose f3"></div>
                <div class="flower yellow f4"></div>
                <div class="flower pink f5"></div>
                <div class="flower blue f6"></div>
                <div class="flower white f7"></div>
                <div class="flower purple f8"></div>
                <div class="flower rose f9"></div>
                <div class="flower pink f10"></div>
                <div class="flower yellow f11"></div>
                <div class="flower white f12"></div>
                <div class="flower rose f13"></div>
                <div class="flower blue f14"></div>
                <div class="flower pink f15"></div>
                <div class="flower purple f16"></div>
                <div class="flower white f17"></div>
                <div class="flower rose f18"></div>
                
                <!-- Leaves -->
                <div class="leaf l1"></div>
                <div class="leaf l2"></div>
                <div class="leaf l3"></div>
                <div class="leaf l4"></div>
                <div class="leaf l5"></div>
                <div class="leaf l6"></div>
                <div class="leaf l7"></div>
                <div class="leaf l8"></div>

                <!-- Accents -->
                <div class="accent a1"></div>
                <div class="accent a2"></div>
                <div class="accent a3"></div>
                <div class="accent a4"></div>
                <div class="accent a5"></div>
                <div class="accent a6"></div>

                <!-- Monogram -->
                <div class="monogram">
                    <span class="h">H</span><span class="s">S</span>
                </div>
            </div>

            <p class="together-text">Together with their families</p>

            <h1 class="names">HANA ALASHRY &<br>SHADY AL-HALAWANI</h1>

            <p class="invite-text">invite you to celebrate their engagement</p>

            <p class="date-main">Wednesday, April Twenty-Second</p>

            <p class="date-details">
                two thousand and twenty six<br>
                at five o'clock in the evening<br>
            </p>

            <p class="venue-name">The Groove Venue, Al Shorouk</p>

            <p class="reception-text">Dinner and festivities to follow</p>

            <a href="https://maps.app.goo.gl/bpr5vCxXMrAWmNgD9" target="_blank" class="map-link">View Location</a>
        </div>

        <!-- Envelope -->
        <div class="envelope">
            <div class="envelope-flap">
                <div class="envelope-pattern"></div>
            </div>
            <div class="envelope-body"></div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana & Shady's Engagement</title>
    <meta property="og:title" content="You're Invited! Hana & Shady's Engagement" />
    <meta property="og:description" content="Wednesday, April 22, 2026 at 5:30 PM - The Grove Venue, Al-Shorouk" />
    <meta property="og:image" content="https://shady-hana-engagement.vercel.app/preview.jpg" />
    <meta property="og:url" content="https://shady-hana-engagement.vercel.app/" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: #fff; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }

        .opening-scene { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            background: #fff;
            z-index: 100; 
            cursor: pointer;
        }
        .opening-scene.hidden { display: none; }

        /* Envelope with card inside */
        .envelope-wrapper {
            position: relative;
            width: 340px;
        }

        .envelope-img {
            width: 100%;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.1));
            transition: opacity 0.5s;
        }
        .envelope-closed { display: block; }
        .envelope-open { position: absolute; top: 0; left: 0; opacity: 0; }
        
        .opened .envelope-closed { opacity: 0; }
        .opened .envelope-open { opacity: 1; position: relative; }

        /* Card slides UP from envelope */
        .card-in-envelope {
            position: absolute;
            width: 62%;
            left: 50%;
            transform: translateX(-50%);
            bottom: 22%;
            opacity: 0;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
        }
        .opened .card-in-envelope {
            opacity: 1;
            bottom: 75%;
        }

        .tap-msg { 
            margin-top: 30px;
            font-size: 14px; 
            font-style: italic; 
            color: #bbb; 
            animation: pulse 2s infinite;
            transition: opacity 0.5s;
        }
        .opened .tap-msg { opacity: 0; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        .continue-btn { 
            margin-top: 30px;
            padding: 14px 50px; 
            font-size: 13px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            border: 1px solid #555; 
            background: #fff; 
            color: #555; 
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease 0.8s;
        }
        .opened .continue-btn { opacity: 1; pointer-events: auto; }

        /* Main Sections */
        .main-content { display: none; background: #F8F5F0; }
        .main-content.visible { display: block; }
        .section { padding: 60px 20px; text-align: center; background: #F8F5F0; }
        .main-title { font-family: 'Great Vibes', cursive; font-size: 42px; color: #444; margin-bottom: 30px; }
        .welcome-text { font-size: 18px; font-style: italic; color: #666; max-width: 400px; margin: 0 auto 35px; line-height: 1.8; }
        
        .rsvp-form, .rsvp-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .rsvp-input { padding: 14px; font-family: 'Cormorant Garamond', serif; font-size: 16px; border: 1px solid #ccc; width: 220px; text-align: center; }
        .rsvp-option { padding: 16px 30px; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid #ccc; background: #fff; cursor: pointer; }
        .rsvp-option.selected { background: #333; color: #fff; }
        .submit-btn { padding: 16px 60px; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; background: #333; color: #fff; border: none; cursor: pointer; }

        .section-venue { padding: 60px 20px; text-align: center; background: #F8F5F0; }
        .venue-image { width: 100%; max-width: 500px; margin-bottom: 30px; }
        .venue-link { color: #333; text-decoration: none; font-size: 13px; letter-spacing: 2px; }

        @media (max-width: 400px) {
            .envelope-wrapper { width: 300px; }
            .rsvp-form, .rsvp-options { flex-direction: column; align-items: center; }
            .rsvp-input, .rsvp-option { width: 280px; }
        }
    </style>
</head>
<body>

    <div class="opening-scene" id="openingScene" onclick="openEnvelope()">
        <div class="envelope-wrapper">
            <img src="envelope-closed.jpg" class="envelope-img envelope-closed" alt="Envelope">
            <img src="envelope-open.jpg" class="envelope-img envelope-open" alt="Envelope Open">
            <img src="invitation-card.jpg" class="card-in-envelope" alt="Invitation">
        </div>
        
        <p class="tap-msg">tap to open</p>
        <button class="continue-btn" onclick="event.stopPropagation(); showContent();">Continue</button>
    </div>

    <div class="main-content" id="mainContent">
        <div class="section">
            <h2 class="main-title">Hana & Shady's Engagement</h2>
            <p class="welcome-text">Join us for the joyous celebration of our engagement. We look forward to sharing this special evening with you.</p>
            
            <div class="rsvp-form">
                <input type="text" id="guestName" class="rsvp-input" placeholder="Your Name">
                <input type="email" id="guestEmail" class="rsvp-input" placeholder="Your Email">
            </div>

            <div class="rsvp-options">
                <button class="rsvp-option" id="btnAttend" onclick="setRsvp('Will Attend')">Will Attend</button>
                <button class="rsvp-option" id="btnDecline" onclick="setRsvp('Can\'t Attend')">Can't Attend</button>
            </div>
            
            <button class="submit-btn" id="btnSubmit" onclick="sendRsvp()">Submit</button>
            <p id="statusMsg" style="margin-top:20px; font-style:italic; display:none;"></p>
        </div>

        <div class="section-venue">
            <p class="main-title" style="font-size:36px">Venue</p>
            <img src="venue.jpg" class="venue-image" alt="Venue">
            <p style="letter-spacing:4px; margin-bottom:15px">THE GROOVE VENUE, AL SHOROUK</p>
            <a href="https://maps.app.goo.gl/bpr5vCxXMrAWmNgD9" target="_blank" class="venue-link">VIEW ON GOOGLE MAPS</a>
        </div>
    </div>

    <script>
        var responseValue = null;
        var isOpened = false;

        function openEnvelope() {
            if (!isOpened) {
                document.getElementById('openingScene').classList.add('opened');
                isOpened = true;
            }
        }

        function showContent() {
            document.getElementById('openingScene').classList.add('hidden');
            document.getElementById('mainContent').classList.add('visible');
            window.scrollTo(0, 0);
        }

        function setRsvp(val) {
            responseValue = val;
            document.getElementById('btnAttend').classList.toggle('selected', val === 'Will Attend');
            document.getElementById('btnDecline').classList.toggle('selected', val === "Can't Attend");
        }

        function sendRsvp() {
            var name = document.getElementById('guestName').value;
            var email = document.getElementById('guestEmail').value;
            if(!name || !email || !responseValue) { alert("Please fill in all fields."); return; }

            document.getElementById('btnSubmit').disabled = true;
            document.getElementById('statusMsg').innerText = "Sending...";
            document.getElementById('statusMsg').style.display = "block";

            fetch("https://script.google.com/macros/s/AKfycbym4kD9VxToh3qHsVy442IOfr1f__GNClr9hvAs7qgYNCnb9fo_9QZUImZXXvVgW_KHWA/exec", {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: name, email: email, response: responseValue })
            }).then(() => {
                document.getElementById('statusMsg').innerText = responseValue === 'Will Attend' ? "Thank you! See you there 💕" : "We'll miss you! 💝";
                document.getElementById('btnSubmit').style.display = "none";
            });
        }
    </script>
</body>
</html>
